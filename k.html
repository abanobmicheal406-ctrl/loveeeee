<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Love Quest 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --bg-grad: linear-gradient(135deg, #f7e7fc 0%, #ffe5ed 100%);
            --glass: rgba(255, 255, 255, 0.25);
            --text: #4a1c24;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-grad); color: var(--text);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* Background Hearts */
        .heart-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; bottom: -20px; background-color: var(--secondary); width: 15px; height: 15px; transform: rotate(-45deg); opacity: 0; animation: floatUp 5s infinite ease-in; }
        .heart::before, .heart::after { content: ""; position: absolute; width: 15px; height: 15px; background-color: var(--secondary); border-radius: 50%; }
        .heart::before { top: -8px; left: 0; } .heart::after { left: 8px; top: 0; }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(-45deg); opacity: 0; } 20% { opacity: 0.4; } 100% { transform: translateY(-110vh) rotate(-45deg); opacity: 0; } }

        #yt-audio-layer { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        #muteBtn { position: fixed; top: 20px; right: 20px; z-index: 100; background: var(--glass); border: 1px solid white; padding: 10px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); display: none; }

        section {
            position: absolute; width: 90%; max-width: 450px; padding: 30px 15px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 30px;
            text-align: center; transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 10;
        }

        .hidden { transform: translateY(120vh) scale(0.8); opacity: 0; pointer-events: none; }
        .active { transform: translateY(0) scale(1); opacity: 1; }
        .past { transform: translateY(-120vh) scale(0.8); opacity: 0; pointer-events: none; }

        h1 { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--primary); margin-bottom: 5px; }
        .btn { background: var(--primary); color: white; padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem; margin-top: 15px; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3); }
        
        input { background: rgba(255,255,255,0.5); border: 2px solid transparent; padding: 12px; border-radius: 15px; text-align: center; font-size: 1.5rem; width: 140px; outline: none; }
        .error { animation: shake 0.4s; border-color: #ff4d4d; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Improved Gallery Grid/Scroll */
        .gallery-container {
            display: flex; gap: 12px; overflow-x: auto; padding: 20px 5px;
            scrollbar-width: none; -ms-overflow-style: none;
            perspective: 1000px;
        }
        .gallery-container::-webkit-scrollbar { display: none; }
        
        .gallery-container img { 
            width: 140px; height: 180px; object-fit: cover; 
            border-radius: 15px; border: 3px solid white; 
            transition: 0.4s; flex-shrink: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .gallery-container img:hover { transform: scale(1.05) translateY(-5px); }

        #gift-box { font-size: 80px; cursor: pointer; display: none; margin: 15px 0; }
        #coupon-display { font-size: 1.6rem; font-weight: 700; color: var(--primary); margin-top: 10px; }

        #letter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center;
            z-index: 200; backdrop-filter: blur(8px);
        }
        .letter-paper {
            background: #fff9e6; width: 80%; max-width: 380px; padding: 30px;
            border-radius: 5px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-family: 'Dancing Script', cursive; font-size: 1.3rem; line-height: 1.5; color: #5d4037;
        }
        #close-letter { margin-top: 20px; font-family: 'Quicksand', sans-serif; font-size: 0.8rem; cursor: pointer; color: var(--primary); text-decoration: underline; }
    </style>
</head>
<body>

    <div id="yt-audio-layer"><div id="player"></div></div>
    <button id="muteBtn" onclick="toggleMute()">🔊</button>

    <section id="page1" class="active">
        <h1>Welcome Back</h1>
        <p>Enter our special code</p>
        <input type="password" id="pinCode" placeholder="****" maxlength="4">
        <br><button class="btn" onclick="checkPin()">Unlock</button>
    </section>

    <section id="page2" class="hidden">
        <h1>Our Journey</h1>
        <p style="font-size: 0.9rem; margin-top: -10px;">(Swipe to see more)</p>
        <div class="gallery-container">
            <img src="photo16.jpg" alt="Memory 1">
            <img src="photo26.jpg" alt="Memory 2">
            <img src="photo3.JPG" alt="Memory 3">
            <img src="photo4.jpg" alt="Memory 4">
            <img src="photo5.jpg" alt="Memory 5">
            <img src="photo6.jpg" alt="Memory 6">
        </div>
        <button class="btn" onclick="nextPage(3)">The Surprise</button>
    </section>

    <section id="page3" class="hidden">
        <h1 id="typewriter"></h1>
        <div id="gift-box" onclick="revealGift()">🎁</div>
        <div id="coupon-display"></div>
        <button id="noteBtn" class="btn" style="display:none;" onclick="openLetter()">Read My Note</button>
    </section>

    <div id="letter-overlay">
        <div class="letter-paper">
            <p>To my favorite person,</p>
            <p>I just wanted to say that 2027 is already better because you're in it. Thank you for being you. ❤️</p>
            <p style="text-align: right;">— your 70k4</p>
            <div id="close-letter" onclick="closeLetter()">Back to the Quest</div>
        </div>
    </div>

    <script>
        var player;
        const videoID = '9BcImoaybxQ'; 

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0', videoId: videoID,
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': videoID },
            });
        }

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('head')[0].appendChild(tag);

        function createHearts() {
            const container = document.createElement('div');
            container.className = 'heart-bg';
            document.body.appendChild(container);
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 600);
        }

        function checkPin() {
            const pin = document.getElementById('pinCode');
            if(pin.value === "2388") { 
                if(player && player.playVideo) player.playVideo();
                document.getElementById('muteBtn').style.display = 'block';
                nextPage(2);
            } else { 
                pin.classList.add('error');
                setTimeout(() => pin.classList.remove('error'), 400);
                pin.value = "";
            }
        }

        function toggleMute() {
            const btn = document.getElementById('muteBtn');
            if(player.isMuted()) { player.unMute(); btn.innerHTML = "🔊"; } 
            else { player.mute(); btn.innerHTML = "🔇"; }
        }

        function nextPage(num) {
            document.querySelector('.active').className = 'past';
            const next = document.getElementById('page' + num);
            next.classList.remove('hidden');
            next.classList.add('active');
            if(num === 3) startTypewriter();
        }

        function startTypewriter() {
            const text = "You deserve the world, but let's start with this...";
            let i = 0;
            const el = document.getElementById('typewriter');
            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++; setTimeout(type, 60);
                } else {
                    document.getElementById('gift-box').style.display = 'block';
                }
            }
            type();
        }

        const gifts = ["Tea Cup ☕", "SH3RYAAAAA 🍜", "FTEER M4LTT 🥐", "M5ROTAAAAA ✨", "SUSHIII 🍣"];

        async function revealGift() {
            const display = document.getElementById('coupon-display');
            const box = document.getElementById('gift-box');
            box.style.pointerEvents = 'none';

            for(let i = 0; i < 12; i++) {
                display.innerHTML = gifts[Math.floor(Math.random() * gifts.length)];
                await new Promise(r => setTimeout(r, 80));
            }

            display.innerHTML = `You won: ${gifts[Math.floor(Math.random() * gifts.length)]}`;
            box.innerHTML = "💝";
            document.getElementById('noteBtn').style.display = 'inline-block';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function openLetter() { document.getElementById('letter-overlay').style.display = 'flex'; }
        function closeLetter() { document.getElementById('letter-overlay').style.display = 'none'; }

        window.onload = createHearts;
    </script>
</body>
</html>
