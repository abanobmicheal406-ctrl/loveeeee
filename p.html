<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for You 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-color: #fff9f0;
            --accent: #d63031;
            --envelope-bg: #e0d4c3;
        }

        body {
            margin: 0;
            background: #fdf2f2;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* --- Petal Styles --- */
        .petal {
            position: absolute;
            background-color: #ff4d6d;
            border-radius: 150% 0 150% 0;
            opacity: 0.7;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes drift {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- The Wax Seal --- */
        .wax-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background: #b32d2e;
            border-radius: 50%;
            transform: translate(-50%, -20%);
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }

        .wax-seal::after { content: '❤'; }

        /* --- Envelope --- */
        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: var(--envelope-bg);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 5;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            z-index: 10;
            border-top: 110px solid #d4c3ad;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.6s 0.3s;
        }

        /* --- The Letter --- */
        .letter {
            position: absolute;
            bottom: 0;
            width: 280px;
            height: 180px;
            background: var(--paper-color);
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.8s ease;
            z-index: 2;
            overflow: hidden;
            left: 10px;
        }

        /* --- Unfolded State --- */
        .unfolded .wax-seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.5);
        }

        .unfolded .envelope::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .unfolded .letter {
            position: fixed; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            max-width: 800px;
            height: 85vh;
            z-index: 50;
            padding: 40px;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* --- Photo Collage Grid --- */
        .collage {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
            opacity: 0;
            transition: opacity 0.5s 1s;
        }

        .unfolded .collage { opacity: 1; }

        .collage img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--accent); font-size: 3rem; margin-top: 0; }

        /* Handwritten Signature Style */
        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #333;
            margin-top: 40px;
            display: block;
            line-height: 1;
        }

        .tap-hint {
            position: absolute;
            top: -60px;
            width: 100%;
            text-align: center;
            color: var(--accent);
            font-weight: bold;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelopeBox" onclick="unfold()">
        <div class="tap-hint">Break the seal 💌</div>
        <div class="wax-seal"></div>

        <div class="envelope">
            <div class="letter">
                <h1>My Dearest,</h1>
                <p style="font-size: 1.1rem; line-height: 1.6;">Every moment we've shared is a memory I treasure. From the big adventures to the quiet mornings, I'm so grateful to have you by my side. Here are some of my favorite snapshots of us:</p>

                <div class="collage">
                    <img src="photo1.png">
                    <img src="photo9.jpg">
                    <img src="photo43.JPG">
                    <img src="photo30.jpg">
                    <img src="photo27.jpg">
                    <img src="photo6.JPG">
                </div>
                
                <span class="signature">With all my love,<br>[MISHA]</span>
            </div>
        </div>
    </div>

    <script>
        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            const size = Math.random() * 12 + 8 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animation = `drift ${Math.random() * 3 + 5}s linear infinite`;
            document.body.appendChild(petal);

            setTimeout(() => { petal.remove(); }, 8000);
        }

        function unfold() {
            const wrapper = document.getElementById('envelopeBox');
            if (!wrapper.classList.contains('unfolded')) {
                wrapper.classList.add('unfolded');
                document.querySelector('.tap-hint').style.display = 'none';
                
                // Start petals when opened
                setInterval(createPetal, 250);
            }
        }
    </script>
</body>
</html>
