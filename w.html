<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandra's Pastel Dream</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --lavender: #e2e2ff; 
            --mint: #f0fff4; 
            --rose: #ffc2d1; 
            --soft-gold: #fcf6bd;
            --text: #7b61ff;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--mint); overflow: hidden; font-family: 'Dancing Script', cursive; transition: background 3s ease; }
        
        /* Slow, calming color transition */
        @keyframes calmFlow {
            0% { background: #f0fff4; }
            50% { background: #e2e2ff; }
            100% { background: #fff0f5; }
        }
        .calm-active { animation: calmFlow 8s infinite alternate ease-in-out; }

        #stage { position: absolute; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .item { position: absolute; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); will-change: transform; }

        /* THE CAKE */
        .cake { width: 180px; }
        .cake-layer { width: 180px; height: 50px; background: white; border-radius: 20px; border: 3px solid var(--rose); margin-top: -8px; }
        .layer-top { width: 130px; height: 35px; background: var(--rose); margin: 0 auto; border-radius: 15px; }
        .layer-mid { width: 160px; height: 45px; background: var(--lavender); margin: 0 auto; border-radius: 15px; }
        .candle { width: 8px; height: 35px; background: var(--soft-gold); margin: 0 auto; position: relative; border-radius: 4px; }
        .flame { width: 14px; height: 20px; background: #ffd166; border-radius: 50% 50% 20% 20%; position: absolute; top: -20px; left: -3px; box-shadow: 0 0 15px #ffd166; animation: flicker 0.2s infinite; }
        
        /* CUPCAKE */
        .cupcake { width: 55px; }
        .cup-top { width: 55px; height: 35px; background: var(--lavender); border-radius: 50%; border: 2px solid white; }
        .cup-base { width: 35px; height: 25px; background: #faedcd; margin: -10px auto 0; border-radius: 0 0 10px 10px; border: 2px solid white; }

        @keyframes flicker { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }

        /* SCROLLER */
        #scroller {
            position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.6);
            color: var(--text); font-size: 1.8rem; white-space: nowrap; overflow: hidden;
            border-top: 1px solid var(--rose); display: none; z-index: 100; backdrop-filter: blur(5px);
        }
        #scroller p { display: inline-block; padding-left: 100%; animation: scrollText 25s linear infinite; }
        @keyframes scrollText { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        #ui { position: fixed; bottom: 50px; width: 100%; text-align: center; z-index: 100; }
        button { background: white; border: 2px solid var(--rose); padding: 18px 45px; border-radius: 50px; font-weight: bold; cursor: pointer; letter-spacing: 2px; font-size: 1.1rem; color: var(--text); box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.1); }
        
        #msg { position: fixed; top: 12%; width: 100%; text-align: center; opacity: 0; transition: 2s; color: var(--text); font-size: clamp(3rem, 8vw, 5rem); z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

    <div id="stage">
        <div class="item cake" id="mainCake" style="left: calc(50% - 90px); top: calc(50% - 90px);">
            <div class="candle"><div class="flame" id="flame"></div></div>
            <div class="layer-top"></div>
            <div class="layer-mid"></div>
            <div class="cake-layer"></div>
        </div>
    </div>

    <h1 id="msg">Happy Birthday, Ya ely t3bany💖💖💖💖💖💖💖💖</h1>

    <div id="scroller"><p>Wishing you a peaceful and beautiful year... ✨ You deserve the world... ✨ Happy Birthday 7ok4a... ✨ Soft wishes and sweet dreams... ✨</p></div>

    <div id="ui">
        <button id="startBtn">Enter the Dream</button>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const mainCake = document.getElementById('mainCake');
        const flame = document.getElementById('flame');
        const startBtn = document.getElementById('startBtn');
        const scroller = document.getElementById('scroller');
        const msg = document.getElementById('msg');
        let exploded = false;
        let audioCtx;

      // "Happy Birthday" Melodic Logic
        const melody = [
            {f: 261.6, d: 0.4}, {f: 261.6, d: 0.2}, {f: 293.7, d: 0.6}, {f: 261.6, d: 0.6}, {f: 349.2, d: 0.6}, {f: 329.6, d: 1.0},
            {f: 261.6, d: 0.4}, {f: 261.6, d: 0.2}, {f: 293.7, d: 0.6}, {f: 261.6, d: 0.6}, {f: 392.0, d: 0.6}, {f: 349.2, d: 1.0},
            {f: 261.6, d: 0.4}, {f: 261.6, d: 0.2}, {f: 523.3, d: 0.6}, {f: 440.0, d: 0.6}, {f: 349.2, d: 0.4}, {f: 329.6, d: 0.4}, {f: 293.7, d: 0.8},
            {f: 466.2, d: 0.4}, {f: 466.2, d: 0.2}, {f: 440.0, d: 0.6}, {f: 349.2, d: 0.6}, {f: 392.0, d: 0.6}, {f: 349.2, d: 1.2}
        ];
        
        function playBirthdaySong() {
            let time = audioCtx.currentTime;
            melody.forEach(note => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'triangle'; // Bright, chime-like sound
                osc.frequency.setValueAtTime(note.f, time);
                g.gain.setValueAtTime(0.15, time);
                g.gain.exponentialRampToValueAtTime(0.001, time + note.d);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(time); osc.stop(time + note.d);
                time += note.d + 0.05;
            });
            setTimeout(playBirthdaySong, (time - audioCtx.currentTime) * 1000);
        }

        function createItem(x, y, type = 'cake', customV = null) {
            const div = document.createElement('div');
            div.className = `item ${type}`;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            
            if(type === 'cake') {
                div.innerHTML = `<div class="layer-top"></div><div class="layer-mid"></div><div class="cake-layer"></div>`;
            } else {
                div.innerHTML = `<div class="cup-top"></div><div class="cup-base"></div>`;
            }
            
            stage.appendChild(div);
            
            let vx = customV ? customV.x : (Math.random() - 0.5) * 35;
            let vy = customV ? customV.y : (Math.random() - 0.5) * 35;
            let rot = 0;

            function move() {
                let l = parseFloat(div.style.left);
                let t = parseFloat(div.style.top);
                l += vx; t += vy; rot += 12;
                
                // Wall Bounce + Speed Increase
                if(l < 0 || l > window.innerWidth - (type === 'cake' ? 180 : 50)) {
                    vx *= -1.05; 
                    if(type === 'cake') shatter(l, t, div);
                }
                if(t < 0 || t > window.innerHeight - (type === 'cake' ? 150 : 60)) {
                    vy *= -1.05;
                }
                
                div.style.left = l + 'px';
                div.style.top = t + 'px';
                div.style.transform = `rotate(${rot}deg) scale(${type === 'cake' ? 1.4 : 1})`;
                
                if(div.parentElement) requestAnimationFrame(move);
            }
            move();
        }

        function shatter(x, y, original) {
            original.remove();
            for(let i=0; i<5; i++) {
                createItem(x, y, 'cupcake', {
                    x: (Math.random() - 0.5) * 55,
                    y: (Math.random() - 0.5) * 55
                });
            }
        }

        function surprise() {
            if (exploded) return;
            exploded = true;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            flame.style.display = 'none';
            document.body.classList.add('party-active');
            msg.style.opacity = '1';
            scroller.style.display = 'block';
            
            playBirthdaySong();
            let rect = mainCake.getBoundingClientRect();
            shatter(rect.left, rect.top, mainCake);
        }

        async function setupMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const aCtx = new AudioContext();
                const analyser = aCtx.createAnalyser();
                aCtx.createMediaStreamSource(stream).connect(analyser);
                const data = new Uint8Array(analyser.frequencyBinCount);
                function check() {
                    if (exploded) return;
                    analyser.getByteFrequencyData(data);
                    let vol = data.reduce((a, b) => a + b) / data.length;
                    if (vol > 55) surprise();
                    requestAnimationFrame(check);
                }
                check();
            } catch { window.onclick = surprise; }
        }

        startBtn.onclick = (e) => {
            e.stopPropagation();
            startBtn.style.display = 'none';
            if (!audioCtx) audioCtx = new AudioContext();
            setupMic();
        };

        window.onclick = (e) => {
            if(exploded) createItem(e.clientX - 90, e.clientY - 45, 'cake');
        };
    </script>
</body>
</html>
