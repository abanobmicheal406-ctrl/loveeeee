<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You, My Love · A Game</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --crimson:#8B0000;--rose:#C41E3A;--gold:#B8960C;--gl:#D4AF37;
  --bg:#0A0305;--bg2:#120008;--text:#F5E6E8;--dim:#9E7B80;
}
html{scroll-behavior:smooth}
body{font-family:'Cormorant Garamond',serif;min-height:100vh;background:var(--bg);
  color:var(--text);overflow-x:hidden;cursor:crosshair}

/* CURSOR */
#cdot,#cring{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cdot{width:8px;height:8px;background:var(--rose);border-radius:50%;mix-blend-mode:screen}
#cring{width:30px;height:30px;border:1px solid rgba(196,30,58,.45);border-radius:50%;transition:all .14s ease}

/* PETALS */
#petals{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.petal{position:absolute;border-radius:50% 0 50% 0;opacity:0;animation:fall linear infinite}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:0}
  10%{opacity:.55}90%{opacity:.25}
  100%{transform:translateY(110vh) rotate(720deg) translateX(50px);opacity:0}
}

/* PAGES */
.page{display:none;min-height:100vh;position:relative;z-index:1;
  flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.page.active{display:flex}

/* SHARED */
.eyebrow{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.38em;
  color:var(--gl);text-transform:uppercase;margin-bottom:14px}
.big-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;
  font-size:clamp(3rem,10vw,7rem);line-height:.95;text-align:center;
  background:linear-gradient(135deg,#F5E6E8 0%,var(--gl) 45%,#C41E3A 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:clamp(1rem,2.2vw,1.2rem);font-style:italic;color:var(--dim);
  text-align:center;max-width:500px;line-height:1.75;margin-top:20px}
.divider{width:90px;height:1px;background:linear-gradient(to right,transparent,var(--rose),transparent);margin:32px auto}
.ornament{font-size:1.8rem;color:var(--rose);animation:hb 3s ease-in-out infinite;display:block;text-align:center;margin-bottom:20px}
@keyframes hb{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.1)}}

/* BUTTON */
.btn{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;
  padding:16px 44px;border:1px solid rgba(196,30,58,.5);background:transparent;
  color:var(--dim);cursor:pointer;position:relative;overflow:hidden;transition:all .4s;
  text-decoration:none;display:inline-block;margin-top:20px}
.btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(139,0,0,.3),transparent);opacity:0;transition:opacity .4s}
.btn:hover{color:var(--gl);border-color:var(--gl)}
.btn:hover::before{opacity:1}

/* INTRO */
#intro{background:radial-gradient(ellipse at 50% 60%,rgba(139,0,0,.35) 0%,transparent 65%),var(--bg)}

/* GAME PAGE */
#game-page{
  background:radial-gradient(ellipse at 30% 40%,rgba(139,0,0,.22) 0%,transparent 55%),var(--bg2);
  padding:30px 16px 60px;
  justify-content:flex-start;
}

/* HUD */
.hud{display:flex;gap:24px;align-items:center;justify-content:center;
  margin-bottom:22px;flex-wrap:wrap}
.hud-box{text-align:center}
.hud-val{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:600;
  background:linear-gradient(135deg,#F5E6E8,var(--gl));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.hud-label{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-top:6px}
.hud-sep{width:1px;height:36px;background:rgba(196,30,58,.3)}

/* heart progress */
.heart-progress{display:flex;gap:5px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;max-width:720px}
.hp{font-size:.9rem;transition:all .3s;opacity:.18;transform:scale(.8)}
.hp.matched{opacity:1;transform:scale(1.1);filter:drop-shadow(0 0 6px rgba(196,30,58,.75))}

/* GRID — 5 cols desktop, 4 cols mobile */
#grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;max-width:680px;width:100%}
@media(max-width:560px){#grid{grid-template-columns:repeat(4,1fr);gap:7px;max-width:400px}}

/* CARD */
.card{aspect-ratio:3/4;position:relative;cursor:pointer;perspective:1000px}
.card-inner{width:100%;height:100%;position:relative;
  transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;
  border-radius:4px;display:flex;align-items:center;justify-content:center}

/* BACK — dark red ♥ */
.card-back{
  background:linear-gradient(145deg,rgba(90,0,18,.98),rgba(12,0,4,1));
  border:1px solid rgba(196,30,58,.3);
  font-size:clamp(1.4rem,3.5vw,2rem);
  color:rgba(196,30,58,.4);
  position:relative;overflow:hidden;
}
.card-back::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 40% 35%,rgba(139,0,0,.2),transparent 60%);
}
.corner-heart{position:absolute;font-size:.5rem;color:rgba(196,30,58,.25)}
.corner-heart.tl{top:5px;left:6px}
.corner-heart.tr{top:5px;right:6px}
.corner-heart.bl{bottom:5px;left:6px}
.corner-heart.br{bottom:5px;right:6px}

/* FRONT — photo */
.card-front{
  transform:rotateY(180deg);
  background:#08020a;
  border:1px solid rgba(212,175,55,.28);
  overflow:hidden;
}
.card-front img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.card-front:hover img{transform:scale(1.06)}

/* placeholder when no photo */
.ph-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;gap:5px;
  background:linear-gradient(135deg,rgba(100,0,20,.9),rgba(18,0,8,.98));
}
.ph-num{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.2em;
  color:rgba(212,175,55,.45);text-transform:uppercase}
.ph-ico{font-size:clamp(1rem,2.5vw,1.5rem);opacity:.3}

.card.matched .card-front{border-color:rgba(212,175,55,.65);
  box-shadow:0 0 16px rgba(196,30,58,.32),inset 0 0 18px rgba(139,0,0,.2)}
.card:hover:not(.matched):not(.flipped) .card-back{border-color:rgba(196,30,58,.55)}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.card.wrong{animation:shake .35s ease}

/* REWARD OVERLAY */
#reward{position:fixed;inset:0;z-index:1000;
  display:none;align-items:center;justify-content:center;
  background:rgba(4,0,2,.94);backdrop-filter:blur(10px);padding:20px}
#reward.show{display:flex}

.reward-box {
  max-width:520px;width:100%;
  border:1px solid rgba(196,30,58,.3);
  background:linear-gradient(135deg,rgba(28,0,10,.98),rgba(8,2,4,1));
  box-shadow:0 0 90px rgba(139,0,0,.22),inset 0 0 40px rgba(139,0,0,.07);
  padding:30px 24px;
  text-align:center;position:relative;
  animation:popIn .6s cubic-bezier(.34,1.56,.64,1) forwards;
  max-height:94vh;
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;
}
@keyframes popIn{from{opacity:0;transform:scale(.84)}to{opacity:1;transform:scale(1)}}
.reward-box::before,.reward-box::after{
  content:'';position:absolute;width:18px;height:18px;
  border-color:var(--gl);border-style:solid}
.reward-box::before{top:12px;left:12px;border-width:1px 0 0 1px}
.reward-box::after{bottom:12px;right:12px;border-width:0 1px 1px 0}

/* COMPLETELY VISIBLE PHOTO STYLING */
.rw-img-wrap{
  width:100%;
  max-height:45vh;
  margin-bottom:18px;
  display:none;
  justify-content:center;
  align-items:center;
}
.rw-img-wrap.show{display:flex}
.rw-img-wrap img{
  max-width:100%;
  max-height:45vh;
  width:auto;
  height:auto;
  object-fit:contain; /* Keeps full picture without cutting edges */
  border:1px solid rgba(212,175,55,.28);
  border-radius:4px;
}

.reward-num{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.35em;
  color:var(--rose);text-transform:uppercase;margin-bottom:8px}
.rw-icon{font-size:1.4rem;color:var(--rose);display:block;margin-bottom:8px;animation:hb 3s ease-in-out infinite}
.reward-title{font-size:clamp(1.2rem,3vw,1.7rem);font-style:italic;font-weight:300;
  background:linear-gradient(135deg,#F5E6E8,var(--gl));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;line-height:1.25}
.reward-msg{font-size:clamp(.92rem,1.7vw,1.05rem);font-style:italic;font-weight:300;
  color:#E0C8CC;line-height:1.75;margin-bottom:15px;padding:0 10px}
.reward-msg em{color:var(--gl)}

.final-title{font-size:clamp(1.8rem,6vw,3.5rem);font-style:italic;font-weight:300;
  background:linear-gradient(135deg,#8B0000,#C41E3A,#F5C0C0,#D4AF37);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;background-size:200%;
  animation:shimmer 4s ease-in-out infinite;line-height:1.05}
@keyframes shimmer{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.fade-in{opacity:0;animation:fadeUp 1s ease forwards}
</style>
</head>
<body>

<div id="petals"></div>
<div id="cdot"></div>
<div id="cring"></div>

<div class="page active" id="intro">
  <span class="ornament">♥</span>
  <p class="eyebrow fade-in" style="animation-delay:.2s">A game made just for you</p>
  <h1 class="big-title fade-in" style="animation-delay:.5s">Unlock<br/>My Heart</h1>
  <p class="sub fade-in" style="animation-delay:.9s">
    Twenty memories hidden in the dark.<br/>
    Match every pair — and unlock a secret piece of my love.
  </p>
  <div class="divider"></div>
  <p class="fade-in" style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.3em;color:var(--gold);text-align:center;margin-top:-16px;animation-delay:1.1s">
    20 PAIRS &nbsp;·&nbsp; 20 LOVE REWARDS &nbsp;·&nbsp; 1 GRAND FINALE
  </p>
  <button class="btn fade-in" style="animation-delay:1.3s" onclick="startGame()">Begin · My Love</button>
</div>

<div class="page" id="game-page">
  <p class="eyebrow" style="margin-bottom:6px;margin-top:12px">Unlock My Heart</p>

  <div class="hud">
    <div class="hud-box">
      <div class="hud-val" id="moves-val">0</div>
      <div class="hud-label">Moves</div>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-box">
      <div class="hud-val" id="pairs-val">0 / 20</div>
      <div class="hud-label">Pairs Found</div>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-box">
      <div class="hud-val" id="time-val">0:00</div>
      <div class="hud-label">Time</div>
    </div>
  </div>

  <div class="heart-progress" id="heart-progress"></div>
  <div id="grid"></div>
</div>

<div id="reward">
  <div class="reward-box">
    <div class="rw-img-wrap" id="rw-img-wrap">
      <img id="rw-photo" src="" alt="Our memory"/>
    </div>
    <div class="reward-num" id="rw-num">Reward 1 of 20</div>
    <span class="rw-icon" id="rw-icon">♥</span>
    <div class="reward-title" id="rw-title"></div>
    <p class="reward-msg" id="rw-msg"></p>
    <button class="btn" id="rw-btn">Continue · Playing</button>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PHOTOS — Array linking all 20 of your specific files
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PHOTOS = [
  'photo1.jpg',    // Pair 1
  'photo2.jpg',    // Pair 2
  'photo3.jpg',    // Pair 3
  'photo4.JPG',    // Pair 4
  'photo5.jpg',    // Pair 5
  'photo6.JPG',    // Pair 6
  'photo7.jpg',    // Pair 7
  'photo9.jpg',    // Pair 8
  'photo25.jpg',   // Pair 9
  'photo27.jpg',   // Pair 10
  'photo26.jpg',   // Pair 11
  'photo28.jpg',   // Pair 12
  'photo29.jpg',   // Pair 13
  'photo30.jpg',   // Pair 14
  'photo31.jpg',   // Pair 15
  'photo34.jpg',   // Pair 16
  'photo37.jpg',   // Pair 17
  'photo38.jpg',   // Pair 18
  'photo39.jpg',   // Pair 19
  'photo43.jpg'    // Pair 20
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// REWARDS — The 20 descriptive records explicitly matching the photo list
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const REWARDS = [
  { 
    title: "Stationery Store Escape", 
    icon: "📚", 
    msg: "Turning an ordinary layout of colorful rows into our own little paradise. <em>Every small plan feels magical when I am executing it right beside you.</em>" 
  },
  { 
    title: "The Radiance of Your Smile", 
    icon: "✨", 
    msg: "There isn't a single lens in the world that can accurately grasp the warmth of your expression. <em>It's a feeling etched safely in my mind.</em>" 
  },
  { 
    title: "Cozy Autumn Evenings", 
    icon: "🕯️", 
    msg: "Moments built in quiet comfort always seem stolen directly out of a romantic dream. <em>Peaceful, timeless, and completely ours.</em>" 
  },
  { 
    title: "Warm Sunsets and Promises", 
    icon: "🌅", 
    msg: "The horizon bled into beautiful gradients, but my favorite view will always be the way light catches your face. <em>A memory too beautiful for words.</em>" 
  },
  { 
    title: "The Heart Knows Instant Clarity", 
    icon: "💌", 
    msg: "Among a million distinct fleeting moments, clarity arrived like a quiet whisper. <em>I knew without a single doubt: it was always you.</em>" 
  },
  { 
    title: "Illuminated Court Lights", 
    icon: "🏀", 
    msg: "Bright lights overhead and cold night air, but everything grew incredibly warm the second you laughed. <em>You hold the key to my favorite spaces.</em>" 
  },
  { 
    title: "Main Character Momentum", 
    icon: "🕶️", 
    msg: "Stepping out with unmatched energy and shared visions. <em>The road ahead feels infinitely lighter when we walk through it hand-in-hand.</em>" 
  },
  { 
    title: "Lantern Glow Festivities", 
    icon: "🏮", 
    msg: "Under the beautiful soft ambient glow of traditional holiday setups. <em>Wrapped up in comfort, finding a deep sense of home wherever you stay.</em>" 
  },
  { 
    title: "Flawless Speckled Reflections", 
    icon: "🪞", 
    msg: "A vintage frame and slightly worn surfaces, yet our connection reflects with absolute perfection. <em>True love doesn't require pristine backgrounds.</em>" 
  },
  { 
    title: "Train Platform Scribbles", 
    icon: "🚇", 
    msg: "Passing time together, crafting jokes, and turning waiting lines into a playground. <em>The destination doesn't matter, as long as the transit is with you.</em>" 
  },
  { 
    title: "Glimpses of Forever", 
    icon: "💫", 
    msg: "A simple frozen frame, yet it holds a lifetime worth of tenderness. <em>Looking at you is like finding the missing piece to a puzzle I forgot I was solving.</em>" 
  },
  { 
    title: "The Sweetest Distractions", 
    icon: "🎈", 
    msg: "No matter how busy the environment becomes, my focus always finds its anchor back to you. <em>You are my favorite pause in a chaotic world.</em>" 
  },
  { 
    title: "Unspoken Language", 
    icon: "💭", 
    msg: "A shared glance, an inside joke told with just our eyes. <em>We never need loud words to communicate the deepest parts of our bond.</em>" 
  },
  { 
    title: "A Delicate Petal's Touch", 
    icon: "🌹", 
    msg: "Soft textures and effortless elegance. You bring a poetic grace to the simplest days, <em>turning ordinary moments into pure romance.</em>" 
  },
  { 
    title: "Timeless Architecture", 
    icon: "🏰", 
    msg: "Monuments stand strong across centuries, but nothing feels more enduring than the love growing quietly between us. <em>Built to last a lifetime.</em>" 
  },
  { 
    title: "Written in the Stars", 
    icon: "🌌", 
    msg: "Every coincidence that brought us together feels like a grand cosmic alignment. <em>Some stories are just meant to be penned down by fate.</em>" 
  },
  { 
    title: "Urban Strolls & Bright Signs", 
    icon: "🌆", 
    msg: "Wandering down city pathways as neon lights flicker to life. <em>The city is bright, but it has absolutely nothing on the glow inside your eyes.</em>" 
  },
  { 
    title: "Signed on Our Sleeves", 
    icon: "✍️", 
    msg: "Memories inked onto fabric from unforgettable milestones. <em>Of all the signatures and traces left behind, your impression is the one I hold closest.</em>" 
  },
  { 
    title: "The Comfort of Your Shadow", 
    icon: "👥", 
    msg: "Side-by-side silhouette captures where even our shadows feel aligned. <em>I am completely proud to walk this life underneath your protective presence.</em>" 
  },
  { 
    title: "The Ultimate Masterpiece", 
    icon: "🎨", 
    msg: "Art galleries hold spectacular exhibits, but none compare to the beautiful scenery of you existing peacefully in my life. <em>You are my living art.</em>" 
  }
];

const FINAL = {
  title:"You Unlocked My Heart",
  msg:"Twenty memories. Twenty reasons.<br/>And still, the list isn't finished.<br/><br/>You are <em>the love I didn't know how to dream of</em> until you appeared.<br/><br/>Thank you for playing. Thank you for being you.<br/>But most of all — <em>thank you for being mine (not exactly).</em>"
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ENGINE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TOTAL=20;
let flipped=[],matched=0,moves=0,locked=false,rewardQueue=[];
let seconds=0,timerInterval=null;

// Cursor
const cdot=document.getElementById('cdot'),cring=document.getElementById('cring');
document.addEventListener('mousemove',e=>{
  cdot.style.left=cring.style.left=e.clientX+'px';
  cdot.style.top=cring.style.top=e.clientY+'px';
});

// Petals
const pc=document.getElementById('petals');
for(let i=0;i<28;i++){
  const p=document.createElement('div');p.className='petal';
  const s=(4+Math.random()*6)+'px';
  p.style.cssText=`left:${Math.random()*100}vw;width:${s};height:${s};
    animation-duration:${8+Math.random()*14}s;animation-delay:${-Math.random()*20}s;
    background:hsl(${340+Math.random()*30},80%,35%)`;
  pc.appendChild(p);
}

// Timer
function startTimer(){
  timerInterval=setInterval(()=>{
    seconds++;
    const m=Math.floor(seconds/60),s=seconds%60;
    document.getElementById('time-val').textContent=m+':'+(s<10?'0':'')+s;
  },1000);
}

// Hearts
function buildHearts(){
  const hp=document.getElementById('heart-progress');hp.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');d.className='hp';d.id='hp-'+i;d.textContent='♥';
    hp.appendChild(d);
  }
}

// Grid
function buildGrid(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  const indices=[...Array(TOTAL).keys(),...Array(TOTAL).keys()];
  for(let i=indices.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [indices[i],indices[j]]=[indices[j],indices[i]];
  }
  indices.forEach(idx=>{
    const card=document.createElement('div');
    card.className='card';card.dataset.id=idx;

    card.innerHTML=`<div class="card-inner">
      <div class="card-back">
        <span class="corner-heart tl">♥</span>
        <span class="corner-heart tr">♥</span>
        <span class="corner-heart bl">♥</span>
        <span class="corner-heart br">♥</span>
        ♥
      </div>
      <div class="card-front" id="cf-${idx}-${Math.random().toString(36).slice(2,7)}">
        <div class="ph-wrap" id="phw-${idx}">
          <span class="ph-ico">📷</span>
          <span class="ph-num">Photo ${idx+1}</span>
        </div>
      </div>
    </div>`;

    // Attempt to load the photo
    const img=document.createElement('img');
    img.src=PHOTOS[idx];
    img.alt='Memory '+(idx+1);
    img.style.cssText='width:100%;height:100%;object-fit:cover;display:none';
    img.onload=function(){
      this.style.display='block';
      const phw=card.querySelector('.ph-wrap');
      if(phw)phw.style.display='none';
      card.querySelector('.card-front').appendChild(this);
    };
    img.onerror=function(){/* keep placeholder */};
    card.querySelector('.card-front').appendChild(img);

    card.addEventListener('click',()=>flipCard(card));
    grid.appendChild(card);
  });
}

function startGame(){
  document.getElementById('intro').classList.remove('active');
  document.getElementById('game-page').classList.add('active');
  buildHearts();buildGrid();startTimer();
}

function flipCard(card){
  if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){
    moves++;
    document.getElementById('moves-val').textContent=moves;
    locked=true;
    const[a,b]=flipped;
    if(a.dataset.id===b.dataset.id){
      setTimeout(()=>{
        a.classList.add('matched');b.classList.add('matched');
        matched++;
        document.getElementById('pairs-val').textContent=matched+' / '+TOTAL;
        document.getElementById('hp-'+(matched-1)).classList.add('matched');
        flipped=[];locked=false;
        rewardQueue.push(Number(a.dataset.id));
        if(matched===TOTAL){clearInterval(timerInterval);setTimeout(()=>showReward(),500);}
        else{setTimeout(()=>showReward(),400);}
      },500);
    } else {
      setTimeout(()=>{
        a.classList.add('wrong');b.classList.add('wrong');
        setTimeout(()=>{
          a.classList.remove('flipped','wrong');b.classList.remove('flipped','wrong');
          flipped=[];locked=false;
        },400);
      },700);
    }
  }
}

function showReward(){
  if(rewardQueue.length===0)return;
  const idx=rewardQueue.shift();
  const isLast=(matched===TOTAL&&rewardQueue.length===0);

  // Photo in reward
  const wrap=document.getElementById('rw-img-wrap');
  const rwp=document.getElementById('rw-photo');
  wrap.classList.remove('show');
  rwp.src=PHOTOS[idx];
  rwp.onload=()=>wrap.classList.add('show');
  rwp.onerror=()=>wrap.classList.remove('show');

  const btn=document.getElementById('rw-btn');
  if(isLast){
    document.getElementById('rw-num').textContent='🎉 All 20 Pairs Matched!';
    document.getElementById('rw-icon').textContent='♥';
    document.getElementById('rw-title').innerHTML=`<span class="final-title">${FINAL.title}</span>`;
    document.getElementById('rw-msg').innerHTML=FINAL.msg;
    btn.textContent='With All My Love ♥';
    btn.onclick=closeFinal;
    const colors=['#8B0000','#C41E3A','#D4AF37','#F5E6E8','#B8960C'];
    confetti({particleCount:220,spread:90,origin:{y:.55},colors});
    setTimeout(()=>confetti({particleCount:120,spread:70,angle:60,origin:{y:.4},colors}),700);
    setTimeout(()=>confetti({particleCount:120,spread:70,angle:120,origin:{y:.4},colors}),1300);
  } else {
    const r=REWARDS[idx];
    document.getElementById('rw-num').textContent=`Reward ${matched} of ${TOTAL}`;
    document.getElementById('rw-icon').textContent=r.icon;
    document.getElementById('rw-title').textContent=r.title;
    document.getElementById('rw-msg').innerHTML=r.msg;
    btn.textContent='Continue · Playing';
    btn.onclick=closeReward;
  }
  document.getElementById('reward').classList.add('show');
}

function closeReward(){
  document.getElementById('reward').classList.remove('show');
  if(rewardQueue.length>0)setTimeout(()=>showReward(),300);
}
function closeFinal(){
  document.getElementById('reward').classList.remove('show');
}
</script>
